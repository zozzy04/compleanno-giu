<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buongiorno ♥</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100dvh; display:flex; align-items:center; justify-content:center; background:#fff8f0; font-family:'Georgia',serif; padding:2rem; }
  .card { max-width:360px; text-align:center; }
  .icon { font-size:2.8rem; margin-bottom:1.5rem; }
  h1 { font-size:1.6rem; font-weight:400; font-style:italic; color:#2a131c; line-height:1.3; margin-bottom:1.25rem; }
  p { font-size:1rem; color:#7a3530; line-height:1.75; }
  .hint { margin-top:2rem; font-size:0.82rem; color:#ecae54; letter-spacing:0.12em; text-transform:uppercase; font-style:normal; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">☀️</div>
  <h1>Buongiorno buon compleanno,<br>vita mia</h1>
  <p>In questo giorno speciale c'è un regalo che ti aspetta.<br>Per trovarlo devi seguire gli indizi.</p>
  <p class="hint">Cerca sotto lo strumento<br>che usi ogni giorno a scuola</p>
</div>
</body>
</html>
